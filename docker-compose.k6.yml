# ============================================================
# k6 load test observability stack
#
# Provides:
#   InfluxDB: receives k6 real-time metric push (millisecond resolution)
#   Grafana:  k6 dashboard fed by InfluxDB (separate from app Grafana)
#
# Why separate from docker-compose.monitoring.yml?
#   - Load test metrics are transient (only relevant during a test run)
#   - InfluxDB's push model gives sub-second resolution k6 needs
#   - Keeping them separate lets us start/stop the k6 stack independently
#
# Usage:
#   Start:  docker compose -f docker-compose.k6.yml up -d
#   Stop:   docker compose -f docker-compose.k6.yml down
#   Reset:  docker compose -f docker-compose.k6.yml down -v
#
# Ports:
#   InfluxDB: 8086 (k6 pushes to http://localhost:8086)
#   Grafana:  3001 (separate port to avoid conflict with app Grafana on 3000)
# ============================================================

version: '3.9'

services:

  # ── InfluxDB — time-series store for k6 metrics ────────────────────────────
  # k6 pushes metrics in real time to InfluxDB via --out influxdb.
  # InfluxDB 1.8 is used (not 2.x) because k6's built-in influxdb output
  # targets the v1 API. k6 v0.47+ supports InfluxDB v2 via the xk6 extension.
  influxdb:
    image: influxdb:1.8-alpine
    container_name: k6-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB:                k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
      INFLUXDB_ADMIN_USER:        admin
      INFLUXDB_ADMIN_PASSWORD:    admin
      INFLUXDB_DATA_MAX_SERIES_PER_DATABASE: 0
    volumes:
      - influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "influx", "-execute", "SHOW DATABASES"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - k6-net

  # ── Grafana — k6 dashboard ─────────────────────────────────────────────────
  grafana-k6:
    image: grafana/grafana:10.4.0
    container_name: k6-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER:          admin
      GF_SECURITY_ADMIN_PASSWORD:      admin
      GF_ANALYTICS_REPORTING_ENABLED:  "false"
      GF_INSTALL_PLUGINS:              ""
      GF_DATASOURCES_DEFAULT_ORG_ID:   1
    volumes:
      - grafana_k6_data:/var/lib/grafana
      - ./deployments/monitoring/grafana/k6-provisioning:/etc/grafana/provisioning:ro
      - ./deployments/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - k6-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  influxdb_data:
  grafana_k6_data:

networks:
  k6-net:
    driver: bridge
    name: k6-net
