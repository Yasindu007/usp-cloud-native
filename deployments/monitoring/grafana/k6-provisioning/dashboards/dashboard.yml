# Grafana dashboard provisioning for the k6-only observability stack.

apiVersion: 1

providers:
  - name: "k6 Load Tests"
    orgId: 1
    folder: "Load Testing"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
