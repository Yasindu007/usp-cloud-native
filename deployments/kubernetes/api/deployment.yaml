apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: urlshortener
spec:
  replicas: 3
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: api
              topologyKey: kubernetes.io/hostname
      containers:
      - name: api
        image: localhost:5001/urlshortener/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
        - name: metrics
          containerPort: 9090
        envFrom:
        - configMapRef:
            name: app-config
        - configMapRef:
            name: api-config
        env:
        - name: DB_PRIMARY_DSN
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: DB_PRIMARY_DSN
        - name: DB_REPLICA_DSN
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: DB_REPLICA_DSN
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: REDIS_PASSWORD
        - name: EXPORT_SIGN_SECRET
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: EXPORT_SIGN_SECRET
        - name: JWT_ISSUER
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: JWT_ISSUER
              optional: true
        - name: JWT_AUDIENCE
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: JWT_AUDIENCE
              optional: true
        - name: JWT_PUBLIC_KEY_PATH
          valueFrom:
            secretKeyRef:
              name: urlshortener-secrets
              key: JWT_PUBLIC_KEY_PATH
              optional: true
        volumeMounts:
        - name: export-data
          mountPath: /data/exports
        - name: secret-files
          mountPath: /var/run/urlshortener-secrets
          readOnly: true
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
        startupProbe:
          httpGet:
            path: /readyz
            port: http
          failureThreshold: 30
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: export-data
        emptyDir: {}
      - name: secret-files
        secret:
          secretName: urlshortener-secrets
          optional: true
