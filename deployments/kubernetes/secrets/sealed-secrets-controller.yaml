apiVersion: v1
kind: ConfigMap
metadata:
  name: sealed-secrets-notes
  namespace: kube-system
  annotations:
    note: "Sealed Secrets controller is installed by scripts/generate-secrets.sh"
data:
  controller-version: "2.15.3"
  helm-chart: "sealed-secrets/sealed-secrets"
  helm-repo: "https://bitnami-labs.github.io/sealed-secrets"
  kubeseal-docs: "https://github.com/bitnami-labs/sealed-secrets"
  key-rotation: "Automatic every 30 days. Old keys are retained for decryption."
  backup: "Export sealing key with kubectl get secret -n kube-system -l sealedsecrets.bitnami.com/sealed-secrets-key -o yaml"
