apiVersion: v1
kind: Namespace
metadata:
  name: urlshortener
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: urlshortener-quota
  namespace: urlshortener
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    persistentvolumeclaims: "4"
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: urlshortener-defaults
  namespace: urlshortener
spec:
  limits:
  - type: Container
    defaultRequest:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
