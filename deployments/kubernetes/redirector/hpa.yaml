apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: redirector-hpa
  namespace: urlshortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: redirector
  minReplicas: 3
  maxReplicas: 15
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
