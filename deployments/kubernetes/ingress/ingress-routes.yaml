apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: urlshortener
  namespace: urlshortener
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/enable-gzip: "true"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.shortener.local
    - r.shortener.local
    secretName: urlshortener-tls
  rules:
  - host: api.shortener.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: api
            port:
              number: 80
  - host: r.shortener.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: redirector
            port:
              number: 80
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: urlshortener-tls
  namespace: urlshortener
spec:
  secretName: urlshortener-tls
  dnsNames:
  - api.shortener.local
  - r.shortener.local
  issuerRef:
    name: urlshortener-issuer
    kind: Issuer
